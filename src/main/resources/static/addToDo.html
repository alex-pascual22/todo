<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="script.js"></script>
    <title>Add To Do</title>
</head>
<body>
<div>
    <h1>Add To Do</h1>
</div>

<div>
    <form id="todoForm">
        <div>
            <label>Title: </label>
            <input type="text" id="title"/>
        </div>
        <div>
            <label>Description: </label>
            <input type="text" id="description"/>
        </div>
        <div>
            <label>Details: </label>
            <textarea id="details"></textarea>
        </div>

        <button type="button" onclick="createTodo()">Save</button>
    </form>
</div>

</body>
</html>
